name: Golfhoogte data ophalen

on:
  schedule:
    - cron: '0,10,20,30,40,50 * * * *'   # Elke 10 minuten (expliciete minuten, betrouwbaarder dan */10)
  workflow_dispatch:                        # Ook handmatig te starten

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Repository ophalen
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Golfhoogte data ophalen
        run: python3 scripts/fetch_waves.py

      - name: Data committen en pushen
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git pull --rebase origin main
          git add data/
          git diff --staged --quiet || git commit -m "Update golfhoogte data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
