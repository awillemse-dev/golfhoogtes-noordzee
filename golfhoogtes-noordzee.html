<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Actuele golfhoogtes</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0a1628;
      color: #e0e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 10px 16px;
      background: #0d1f3c;
      border-bottom: 1px solid #1e3a5f;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    header h1 { font-size: 1.05rem; font-weight: 600; color: #7dd3fc; }

    /* ── Navigatie ───────────────────────────────────────────────────── */
    nav { display: flex; gap: 4px; }

    .nav-btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid transparent;
      background: none;
      color: #94a3b8;
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    .nav-btn:hover  { background: #1e3a5f; color: #e0e8f0; }
    .nav-btn.active { background: #1e3a5f; color: #7dd3fc; border-color: #2d5a8e; }

    #status { font-size: 0.8rem; color: #94a3b8; margin-left: auto; }
    #status span         { color: #4ade80; font-weight: 500; }
    #status.loading span { color: #fbbf24; }
    #status.error span   { color: #f87171; }
    #countdown { font-size: 0.75rem; color: #64748b; }

    /* Kaart + grafiekpaneel naast elkaar */
    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    #map { flex: 1; }

    /* ── Grafiekpaneel ─────────────────────────────────────────────── */
    #chart-panel {
      width: 0;
      overflow: hidden;
      background: #0d1f3c;
      border-left: 1px solid #1e3a5f;
      display: flex;
      flex-direction: column;
      transition: width 0.3s ease;
      flex-shrink: 0;
    }
    #chart-panel.open { width: 380px; }

    #chart-header {
      padding: 12px 16px 10px;
      border-bottom: 1px solid #1e3a5f;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    #chart-station {
      flex: 1;
    }
    #chart-naam {
      font-size: 0.95rem;
      font-weight: 700;
      color: #7dd3fc;
      line-height: 1.3;
    }
    #chart-subtitle {
      font-size: 0.72rem;
      color: #64748b;
      margin-top: 2px;
    }
    #chart-close {
      background: none;
      border: none;
      color: #64748b;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
      flex-shrink: 0;
    }
    #chart-close:hover { color: #e0e8f0; }

    #chart-current {
      padding: 10px 16px;
      border-bottom: 1px solid #1e3a5f;
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    #chart-hm0 {
      font-size: 2rem;
      font-weight: 700;
    }
    #chart-hm0-label {
      font-size: 0.78rem;
      color: #94a3b8;
    }
    #chart-time {
      margin-left: auto;
      font-size: 0.72rem;
      color: #64748b;
    }

    #chart-body {
      flex: 1;
      padding: 12px 16px 16px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    #chart-period-label {
      font-size: 0.72rem;
      color: #64748b;
      margin-bottom: 8px;
    }
    #chart-wrap {
      flex: 1;
      position: relative;
      min-height: 0;
    }
    #chart-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
      font-size: 0.85rem;
    }

    /* Legend */
    .legend {
      background: rgba(13,31,60,0.93);
      border: 1px solid #1e3a5f;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.78rem;
      line-height: 1.85;
      color: #cbd5e1;
    }
    .legend h4  { font-size: 0.8rem; color: #7dd3fc; margin-bottom: 6px; font-weight: 600; }
    .legend-sub { font-size: 0.68rem; color: #475569; margin-top: 4px; }
    .legend-row { display: flex; align-items: center; gap: 8px; }
    .legend-dot {
      width: 14px; height: 14px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.25); flex-shrink: 0;
    }

    /* Leaflet popup */
    .leaflet-popup-content-wrapper {
      background: #0d1f3c; color: #e0e8f0;
      border: 1px solid #1e3a5f; border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .leaflet-popup-tip          { background: #0d1f3c; }
    .leaflet-popup-close-button { color: #94a3b8 !important; }
    .popup-naam   { font-weight: 700; font-size: 0.9rem; color: #7dd3fc; margin-bottom: 4px; }
    .popup-waarde { font-size: 1.4rem; font-weight: 700; margin: 2px 0; }
    .popup-meta   { font-size: 0.74rem; color: #94a3b8; margin-top: 2px; }
    .popup-tijd   { font-size: 0.7rem; color: #64748b; margin-top: 2px; }
    .popup-hint   { font-size: 0.68rem; color: #334155; margin-top: 6px; font-style: italic; }
    .leaflet-div-icon { background: none !important; border: none !important; }
  </style>
</head>
<body>

<header>
  <h1>Actuele zeedata</h1>

  <nav>
    <button class="nav-btn active" id="nav-golf" onclick="selectLayer('golf')">🌊 Golfhoogte</button>
    <button class="nav-btn"        id="nav-temp" onclick="selectLayer('temp')">🌡️ Zeewatertemperatuur</button>
    <button class="nav-btn"        id="nav-wind" onclick="selectLayer('wind')">💨 Windsnelheid</button>
  </nav>

  <div id="status" class="loading">Status: <span>laden…</span></div>
  <div id="countdown"></div>
</header>

<div id="main">
  <div id="map"></div>
  <div id="coming-soon" style="display:none; flex:1; flex-direction:column; align-items:center; justify-content:center; gap:12px; color:#475569;">
    <div style="font-size:2.5rem;">🚧</div>
    <div style="font-size:1rem; font-weight:600; color:#64748b;" id="coming-soon-label"></div>
    <div style="font-size:0.85rem;">Data volgt binnenkort</div>
  </div>

  <!-- Grafiekpaneel -->
  <div id="chart-panel">
    <div id="chart-header">
      <div id="chart-station">
        <div id="chart-naam">—</div>
        <div id="chart-subtitle">Golfhoogte afgelopen 24 uur</div>
      </div>
      <button id="chart-close" title="Sluiten">✕</button>
    </div>
    <div id="chart-current">
      <div id="chart-hm0" style="color:#475569">–</div>
      <div id="chart-hm0-label">m Hm0</div>
      <div id="chart-time">–</div>
    </div>
    <div id="chart-body">
      <div id="chart-period-label">Afgelopen 24 uur</div>
      <div id="chart-wrap">
        <div id="chart-loading">Klik op een station…</div>
        <canvas id="wave-chart" style="display:none"></canvas>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script>
// ── Kaart ────────────────────────────────────────────────────────────────────
const map = L.map('map', { center: [54.5, 4.5], zoom: 7 });

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution:
    '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> ' +
    '&copy; <a href="https://carto.com/">CARTO</a> | ' +
    'Data: <a href="https://waterinfo.rws.nl">Rijkswaterstaat</a>',
  maxZoom: 19,
}).addTo(map);

// ── Legenda ──────────────────────────────────────────────────────────────────
const legend = L.control({ position: 'bottomright' });
legend.onAdd = () => {
  const d = L.DomUtil.create('div', 'legend');
  d.innerHTML = `
    <h4>Golfhoogte Hm0</h4>
    <div class="legend-row"><div class="legend-dot" style="background:#22c55e"></div>&lt; 0,5 m</div>
    <div class="legend-row"><div class="legend-dot" style="background:#84cc16"></div>0,5 – 1,0 m</div>
    <div class="legend-row"><div class="legend-dot" style="background:#eab308"></div>1,0 – 1,5 m</div>
    <div class="legend-row"><div class="legend-dot" style="background:#f97316"></div>1,5 – 2,5 m</div>
    <div class="legend-row"><div class="legend-dot" style="background:#ef4444"></div>2,5 – 4,0 m</div>
    <div class="legend-row"><div class="legend-dot" style="background:#7f1d1d"></div>&gt; 4,0 m</div>
    <div class="legend-sub">Bron: Rijkswaterstaat meetstations</div>`;
  return d;
};
legend.addTo(map);

// ── Kleur & icoon ─────────────────────────────────────────────────────────────
function waveColor(h) {
  if (h === null || isNaN(h)) return '#475569';
  if (h < 0.5)  return '#22c55e';
  if (h < 1.0)  return '#84cc16';
  if (h < 1.5)  return '#eab308';
  if (h < 2.5)  return '#f97316';
  if (h < 4.0)  return '#ef4444';
  return '#7f1d1d';
}

function makeIcon(h) {
  const color = waveColor(h);
  const w     = h !== null ? Math.max(18, Math.min(54, 18 + h * 8)) : 18;
  const ht    = Math.round(w * 0.62);
  const label = h !== null ? h.toFixed(1) : '–';
  return L.divIcon({
    className:   '',
    iconSize:    [w, ht],
    iconAnchor:  [w / 2, ht / 2],
    popupAnchor: [0, -(ht / 2 + 4)],
    html: `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${ht}">
      <ellipse cx="${w/2}" cy="${ht/2}" rx="${w/2-1}" ry="${ht/2-1}"
        fill="${color}" fill-opacity="0.9"/>
      <text x="${w/2}" y="${ht/2+3.5}" text-anchor="middle"
        font-family="Segoe UI,Arial,sans-serif" font-size="9"
        font-weight="700" fill="white">${label}</text>
    </svg>`,
  });
}

// ── Temperatuurkaart ──────────────────────────────────────────────────────────

function tempColor(t) {
  if (t === null || isNaN(t)) return '#475569';
  if (t < 5)  return '#bfdbfe';  // ijskoud – lichtblauw
  if (t < 8)  return '#60a5fa';  // koud    – blauw
  if (t < 11) return '#34d399';  // fris    – groen
  if (t < 14) return '#fbbf24';  // warm    – geel
  if (t < 18) return '#f97316';  // warm    – oranje
  return '#ef4444';               // heet    – rood
}

function makeTempIcon(t) {
  const color = tempColor(t);
  const w  = 30;
  const ht = 19;
  const label = t !== null ? t.toFixed(1) : '–';
  return L.divIcon({
    className:   '',
    iconSize:    [w, ht],
    iconAnchor:  [w / 2, ht / 2],
    popupAnchor: [0, -(ht / 2 + 4)],
    html: `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${ht}">
      <ellipse cx="${w/2}" cy="${ht/2}" rx="${w/2-1}" ry="${ht/2-1}"
        fill="${color}" fill-opacity="0.9"/>
      <text x="${w/2}" y="${ht/2+3.5}" text-anchor="middle"
        font-family="Segoe UI,Arial,sans-serif" font-size="9"
        font-weight="700" fill="white">${label}</text>
    </svg>`,
  });
}

let tempMarkers = [];

function clearTempMarkers() {
  tempMarkers.forEach(m => map.removeLayer(m));
  tempMarkers = [];
}

function renderTempMarkers(geojson) {
  clearMarkers();
  clearTempMarkers();
  (geojson.features || []).forEach(f => {
    const [lon, lat] = f.geometry.coordinates;
    const p = f.properties;
    const t = p.temp_c;

    const marker = L.marker([lat, lon], { icon: makeTempIcon(t) });

    const bronLabel = p.bron === 'CEFAS' ? 'CEFAS' : 'RWS';
    const bronBadge = `<span style="color:#94a3b8;font-size:0.68rem">${bronLabel}</span>`;
    const waardeHtml = t !== null
      ? `<div class="popup-waarde" style="color:${tempColor(t)}">${t.toFixed(1)} °C</div>`
      : `<div class="popup-waarde" style="color:#475569">Geen data</div>`;

    marker.on('click', () => openTempChart(p.code, p.naam || p.code, t, p.tijdstip));

    marker.addTo(map);
    tempMarkers.push(marker);
  });

  if (tempMarkers.length > 0 && map.getZoom() < 5) {
    map.fitBounds(L.featureGroup(tempMarkers).getBounds().pad(0.1));
  }
}

function tempUrl()            { return `${PROXY_URL}/api/temp`; }
function tempHistoryUrl(code) { return `${PROXY_URL}/api/temp-history?code=${encodeURIComponent(code)}`; }

async function fetchTempData() {
  setStatus('loading', 'laden…');
  try {
    const resp = await fetch(tempUrl(), { cache: 'no-store' });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const geojson = await resp.json();
    renderTempMarkers(geojson);
    const opgehaald = geojson.opgehaald
      ? new Date(geojson.opgehaald).toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' })
      : new Date().toLocaleTimeString('nl-NL');
    setStatus('ok', `${geojson.aantalStations} stations — bijgewerkt ${opgehaald}`);
  } catch (err) {
    console.error(err);
    setStatus('error', LOCAL ? 'Proxy niet bereikbaar' : 'Data niet beschikbaar');
  }
}

// ── Navigatie / dropdown ──────────────────────────────────────────────────────

let activeLayer = 'golf';

function selectLayer(layer) {
  if (layer === activeLayer) return;
  activeLayer = layer;

  // Actieve knop markeren
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`nav-${layer}`).classList.add('active');

  // Kaartinhoud wisselen
  const mapEl      = document.getElementById('map');
  const comingSoon = document.getElementById('coming-soon');

  if (layer === 'golf') {
    mapEl.style.display      = '';
    comingSoon.style.display = 'none';
    fetchWaveData().then(startCountdown);
  } else if (layer === 'temp') {
    mapEl.style.display      = '';
    comingSoon.style.display = 'none';
    fetchTempData().then(startCountdown);
  } else {
    mapEl.style.display      = 'none';
    comingSoon.style.display = 'flex';
    const labels = { wind: 'Windsnelheid' };
    document.getElementById('coming-soon-label').textContent = labels[layer] || layer;
    document.getElementById('status').className = '';
    document.getElementById('status').innerHTML = 'Status: <span>–</span>';
    document.getElementById('countdown').textContent = '';
  }
}

// ── Kaartdata ─────────────────────────────────────────────────────────────────
// Lokaal: proxy op localhost:3001
// Online: live proxy op Render (altijd actuele data)
const LOCAL      = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
const PROXY_URL  = LOCAL ? 'http://localhost:3001' : 'https://noordzee-proxy.onrender.com';

function wavesUrl()              { return `${PROXY_URL}/api/waves`; }
function historyUrl(code)        { return `${PROXY_URL}/api/history?code=${encodeURIComponent(code)}`; }
let markers = [];

function clearMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
}

function formatTijdstip(iso) {
  if (!iso) return '–';
  return new Date(iso).toLocaleString('nl-NL', {
    day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit',
    timeZone: 'Europe/Amsterdam',
  });
}

function renderMarkers(geojson) {
  clearMarkers();
  (geojson.features || []).forEach(f => {
    const [lon, lat] = f.geometry.coordinates;
    const p = f.properties;
    const h = p.hm0_m;

    const marker = L.marker([lat, lon], { icon: makeIcon(h) });

    const waardeHtml = h !== null
      ? `<div class="popup-waarde" style="color:${waveColor(h)}">${h.toFixed(2)} m</div>`
      : `<div class="popup-waarde" style="color:#475569">Geen data</div>`;

    marker.on('click', () => openChart(p.code, p.naam, h, p.tijdstip));
    marker.addTo(map);
    markers.push(marker);
  });

  if (markers.length > 0 && map.getZoom() < 5) {
    map.fitBounds(L.featureGroup(markers).getBounds().pad(0.1));
  }
}

async function fetchWaveData() {
  setStatus('loading', 'laden…');
  try {
    const resp = await fetch(wavesUrl(), { cache: 'no-store' });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const geojson = await resp.json();
    renderMarkers(geojson);
    const opgehaald = geojson.opgehaald
      ? new Date(geojson.opgehaald).toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' })
      : new Date().toLocaleTimeString('nl-NL');
    setStatus('ok', `${geojson.aantalStations} stations — bijgewerkt ${opgehaald}`);
  } catch (err) {
    console.error(err);
    setStatus('error', LOCAL ? 'Proxy niet bereikbaar — draait rws-proxy.py?' : 'Data niet beschikbaar — GitHub Action nog niet gedraaid?');
  }
}

// ── Grafiekpaneel ─────────────────────────────────────────────────────────────
let chartInstance = null;

const panel      = document.getElementById('chart-panel');
const canvasEl   = document.getElementById('wave-chart');
const loadingEl  = document.getElementById('chart-loading');

document.getElementById('chart-close').addEventListener('click', () => {
  panel.classList.remove('open');
  map.invalidateSize();
});

async function openChart(code, naam, huidigHm0, tijdstip) {
  // Paneel openen
  panel.classList.add('open');
  map.invalidateSize();

  // Header bijwerken
  document.getElementById('chart-naam').textContent     = naam || code;
  document.getElementById('chart-subtitle').textContent = 'Golfhoogte afgelopen 24 uur';
  document.getElementById('chart-hm0-label').textContent = 'm Hm0';
  const color = waveColor(huidigHm0);
  document.getElementById('chart-hm0').textContent  = huidigHm0 !== null ? huidigHm0.toFixed(2) : '–';
  document.getElementById('chart-hm0').style.color  = color;
  document.getElementById('chart-time').textContent = formatTijdstip(tijdstip);

  // Laadstatus
  loadingEl.textContent = 'Geschiedenis laden…';
  loadingEl.style.display = 'flex';
  canvasEl.style.display  = 'none';

  // Oude grafiek verwijderen
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

  try {
    const resp = await fetch(historyUrl(code), { cache: 'no-store' });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const json = await resp.json();
    if (!json.data || json.data.length === 0) {
      loadingEl.textContent = 'Geen historische data beschikbaar.';
      return;
    }

    loadingEl.style.display = 'none';
    canvasEl.style.display  = 'block';

    const labels = json.data.map(d => new Date(d.t));
    const values = json.data.map(d => d.v);
    const maxVal = Math.max(...values);

    chartInstance = new Chart(canvasEl, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data:            values,
          borderColor:     color,
          backgroundColor: color + '22',
          borderWidth:     2,
          pointRadius:     0,
          pointHoverRadius:4,
          fill:            true,
          tension:         0.3,
        }],
      },
      options: {
        responsive:          true,
        maintainAspectRatio: false,
        animation:           false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#0d1f3c',
            borderColor:     '#1e3a5f',
            borderWidth:     1,
            titleColor:      '#94a3b8',
            bodyColor:       '#e0e8f0',
            callbacks: {
              title: items => new Date(items[0].parsed.x).toLocaleString('nl-NL', {
                day: '2-digit', month: '2-digit',
                hour: '2-digit', minute: '2-digit',
                timeZone: 'Europe/Amsterdam',
              }),
              label: item => ` ${item.parsed.y.toFixed(2)} m`,
            },
          },
        },
        scales: {
          x: {
            type: 'time',
            time: {
              unit:         'hour',
              displayFormats: { hour: 'HH:mm' },
            },
            ticks: {
              color:     '#64748b',
              maxTicksLimit: 8,
              font: { size: 10 },
            },
            grid: { color: '#1e3a5f' },
          },
          y: {
            min:         0,
            suggestedMax: Math.max(maxVal * 1.2, 0.5),
            ticks: {
              color: '#64748b',
              font:  { size: 10 },
              callback: v => v.toFixed(1) + ' m',
            },
            grid: { color: '#1e3a5f' },
          },
        },
      },
    });

  } catch (err) {
    console.error(err);
    loadingEl.textContent = 'Fout bij laden: ' + err.message;
  }
}

async function openTempChart(code, naam, huidigTemp, tijdstip) {
  // Paneel openen
  panel.classList.add('open');
  map.invalidateSize();

  // Header bijwerken
  document.getElementById('chart-naam').textContent      = naam || code;
  document.getElementById('chart-subtitle').textContent  = 'Temperatuur afgelopen 24 uur';
  document.getElementById('chart-hm0-label').textContent = '°C';
  const color = tempColor(huidigTemp);
  document.getElementById('chart-hm0').textContent  = huidigTemp !== null ? huidigTemp.toFixed(1) : '–';
  document.getElementById('chart-hm0').style.color  = color;
  document.getElementById('chart-time').textContent = formatTijdstip(tijdstip);

  // Laadstatus
  loadingEl.textContent    = 'Geschiedenis laden…';
  loadingEl.style.display  = 'flex';
  canvasEl.style.display   = 'none';

  // Oude grafiek verwijderen
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

  try {
    const resp = await fetch(tempHistoryUrl(code), { cache: 'no-store' });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const json = await resp.json();
    if (!json.data || json.data.length === 0) {
      loadingEl.textContent = 'Geen historische data beschikbaar.';
      return;
    }

    loadingEl.style.display = 'none';
    canvasEl.style.display  = 'block';

    const labels = json.data.map(d => new Date(d.t));
    const values = json.data.map(d => d.v);
    const minVal = Math.min(...values);
    const maxVal = Math.max(...values);

    chartInstance = new Chart(canvasEl, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data:            values,
          borderColor:     color,
          backgroundColor: color + '22',
          borderWidth:     2,
          pointRadius:     0,
          pointHoverRadius:4,
          fill:            true,
          tension:         0.3,
        }],
      },
      options: {
        responsive:          true,
        maintainAspectRatio: false,
        animation:           false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#0d1f3c',
            borderColor:     '#1e3a5f',
            borderWidth:     1,
            titleColor:      '#94a3b8',
            bodyColor:       '#e0e8f0',
            callbacks: {
              title: items => new Date(items[0].parsed.x).toLocaleString('nl-NL', {
                day: '2-digit', month: '2-digit',
                hour: '2-digit', minute: '2-digit',
                timeZone: 'Europe/Amsterdam',
              }),
              label: item => ` ${item.parsed.y.toFixed(1)} °C`,
            },
          },
        },
        scales: {
          x: {
            type: 'time',
            time: {
              unit:           'hour',
              displayFormats: { hour: 'HH:mm' },
            },
            ticks: {
              color:         '#64748b',
              maxTicksLimit: 8,
              font: { size: 10 },
            },
            grid: { color: '#1e3a5f' },
          },
          y: {
            suggestedMin: Math.max(0, minVal - 1),
            suggestedMax: maxVal + 1,
            ticks: {
              color: '#64748b',
              font:  { size: 10 },
              callback: v => v.toFixed(1) + ' °C',
            },
            grid: { color: '#1e3a5f' },
          },
        },
      },
    });

  } catch (err) {
    console.error(err);
    loadingEl.textContent = 'Fout bij laden: ' + err.message;
  }
}

// ── Status & countdown ────────────────────────────────────────────────────────
function setStatus(state, text) {
  const el = document.getElementById('status');
  el.className = state;
  el.innerHTML = `Status: <span>${text}</span>`;
}

const UPDATE_SEC = 10 * 60;
let secondsLeft  = 0;

function startCountdown() {
  secondsLeft = UPDATE_SEC;
  const el  = document.getElementById('countdown');
  const tid = setInterval(() => {
    secondsLeft--;
    if (secondsLeft <= 0) {
      clearInterval(tid);
      el.textContent = '';
      const fetchFn = activeLayer === 'temp' ? fetchTempData : fetchWaveData;
      fetchFn().then(startCountdown);
    } else {
      const m = Math.floor(secondsLeft / 60);
      const s = secondsLeft % 60;
      el.textContent = `Update over ${m}:${String(s).padStart(2, '0')}`;
    }
  }, 1000);
}

// ── Start ─────────────────────────────────────────────────────────────────────
fetchWaveData().then(startCountdown);
</script>
